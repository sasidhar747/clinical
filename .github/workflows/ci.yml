name: CI — Smart Clinic Management System

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Backend Build & Test ───────────────────────
  backend-ci:
    name: Backend Build & Test (Java / Spring Boot)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: scms_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Run Unit Tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/scms_test_db?useSSL=false&serverTimezone=UTC
          DB_USERNAME: root
          DB_PASSWORD: rootpassword
          JWT_SECRET: ci_test_secret_key
          MONGO_URI: mongodb://localhost:27017/scms_test
        run: mvn test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  # ── Docker Build Check ─────────────────────────
  docker-build:
    name: Docker Image Build Check
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: scms-backend:ci

  # ── Frontend Lint ──────────────────────────────
  frontend-check:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check frontend files exist
        run: |
          test -f frontend/index.html && echo "✅ index.html found"
          test -f frontend/style.css  && echo "✅ style.css found"
          test -f frontend/app.js     && echo "✅ app.js found"

      - name: HTML validation (basic)
        run: |
          grep -l "<!DOCTYPE html>" frontend/index.html && echo "✅ DOCTYPE present"
          grep -l "<title>" frontend/index.html && echo "✅ Title tag present"
