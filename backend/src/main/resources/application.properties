# ── Server ──────────────────────────────────
server.port=8080

# ── MySQL DataSource ─────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/scms_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── MongoDB ──────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/scms_audit}

# ── JWT ──────────────────────────────────────
jwt.secret=${JWT_SECRET:scms_super_secret_key_2026}
jwt.expiration.ms=86400000

# ── Logging ──────────────────────────────────
logging.level.com.clinic.scms=DEBUG
logging.level.org.springframework.web=INFO
